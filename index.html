const Icon = ({ name }) => {
  const icons = { workout: '🏋️', dashboard: '📊', history: '📅', nutrition: '🍽️', profile: '👤', check: '✓', plus: '+', edit: '✏️', trash: '🗑️' };

};

const Timer = ({ seconds, onComplete }) => {
  const [sec, setSec] = useState(seconds);
  useEffect(() => { if (sec <= 0) { onComplete?.(); return; } const id = setInterval(() => setSec(s => s - 1), 1000); return () => clearInterval(id); }, [sec, onComplete]);
  const min = Math.floor(sec / 60), secs = sec % 60, isLow = sec <= 5;
  return <span style={{ animation: isLow ? 'pulse 0.8s infinite' : 'none' }}>⏱ {min}:{secs < 10 ? '0' : ''}{secs}</span>;
};

const Modal = ({ isOpen, title, children, onClose }) => {
  useEffect(() => { if (isOpen) { const h = (e) => e.key === 'Escape' && onClose?.(); document.addEventListener('keydown', h); return () => document.removeEventListener('keydown', h); } }, [isOpen, onClose]);
  return !isOpen ? null : (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose?.()}>
      <div className="modal"><div className="modal-handle" />{title && <div className="modal-title">{title}</div>}{children}</div>
    </div>
  );
};

const Toggle = ({ value, onChange }) => (
  <button className={`toggle ${value ? 'active' : ''}`} onClick={() => onChange?.(!value)}>

  </button>
);

/* ═══════════════════════════════════════════════════════════════ */
/* 📄 WORKOUT PAGE */
/* ═══════════════════════════════════════════════════════════════ */

  const [sync, setSync] = useState({});
  const [timerEx, setTimerEx] = useState(null);
  const [showModal, setShowModal] = useState(false);
  const [editIdx, setEditIdx] = useState(null);
  const [form, setForm] = useState({ name: '', sets: '3', rest: 60 });
  const [mood, setMood] = useState(null);

  if (!profile) return <div style={{ padding: 20, color: 'var(--text)' }}>Загрузка...</div>;

  const userId = profile.id || profile.userId;

  /* ✅ Load exercises from Firebase */
  useEffect(() => {
    if (!userId) return;
    const ref = db.ref(`program/${userId}`);
    const callback = (snap) => {
      const data = snap.val();
      setExercises(data || DEFAULT_EXERCISES.his); // Default fallback
    };
    ref.on('value', callback);
    return () => ref.off('value', callback);
  }, [userId]);

  /* ✅ Subscribe to workouts */
  useEffect(() => {
    if (!userId) return;
    const day = today();
    const ref = db.ref(`workouts/${day}/${userId}`);
    const callback = (snap) => setSync(snap.val() || {});
    ref.on('value', callback);
    return () => ref.off('value', callback);
  }, [userId]);

  /* ✅ Load mood from Firebase */
  useEffect(() => {
    if (!userId) return;
    const ref = db.ref(`moods/${today()}/${userId}`);
    const callback = (snap) => setMood(snap.val());
    ref.on('value', callback);
    return () => ref.off('value', callback);
  }, [userId]);

  const completed = useMemo(() => exercises.filter(e => sync[e.id]?.isDone).length, [exercises, sync]);
  const progress = exercises.length ? (completed / exercises.length) * 100 : 0;

  const handleUpdate = useCallback((exId, field, value) => {
    const day = today();
    const updates = {};
    updates[`workouts/${day}/${userId}/${exId}/${field}`] = value;
    db.ref().update(updates);
    if (field === 'isDone' && value) {
      tg?.HapticFeedback?.notificationOccurred?.('success');
      // Offer to start timer for this exercise
      const exercise = exercises.find(e => e.id === exId);
      if (exercise && exercise.rest > 0) {
        if (window.confirm(`Запустить таймер отдыха на ${exercise.rest} секунд?`)) {
          setTimerEx(exId);
        }
      }
      if (completed === exercises.length - 1) {
        confetti?.({ particleCount: 160, spread: 72, origin: { y: 0.6 } });
      }
    }
  }, [completed, exercises.length, userId, exercises]);

  const handleSaveExercise = () => {
    if (!form.name.trim()) return;
    const updated = [...exercises];
    if (editIdx !== null) {
      updated[editIdx] = { ...updated[editIdx], ...form, rest: +form.rest || 60 };
    } else {
      updated.push({ id: `ex_${Date.now()}`, ...form, rest: +form.rest || 60 });
    }
    setExercises(updated);
    db.ref(`program/${userId}`).set(updated);
    setShowModal(false);
  };

  const handleMoodSelect = (selectedMood) => {
    setMood(selectedMood);
    db.ref(`moods/${today()}/${userId}`).set(selectedMood);
  };

  return (
    <div className="page active">
      <div style={{ marginBottom: 16 }}>
        <h1 className="title-lg">Тренировка</h1>
        <p className="subtitle">{Math.round(progress)}% завершено</p>
        <div className="progress-bar"><div className="progress-fill" style={{ width: `${progress}%` }} /></div>
        {progress === 100 && <div style={{ textAlign: 'center', marginTop: 8, color: 'var(--green)', fontWeight: 700 }}>🎉 Браво!</div>}
      </div>

      {/* Mood Tracker */}
      <div className="card">
        <label className="label">Настроение перед тренировкой</label>
        <div className="mood-selector">
          {MOODS.map(m => (
            <button key={m} className={`mood-btn ${mood === m ? 'active' : ''}`} onClick={() => handleMoodSelect(m)}>{m}</button>
          ))}
        </div>
      </div>

      <div className="card">
        {exercises.length === 0 ? (
          <p style={{ textAlign: 'center', color: 'var(--text2)', padding: '20px' }}>Нет упражнений. Добавь первое!</p>
        ) : (
          exercises.map((ex, idx) => {
            const data = sync[ex.id] || {};
            return (
              <div key={ex.id} className={`exercise-item ${data.isDone ? 'completed' : ''}`}>
                <button className={`checkbox ${data.isDone ? 'active' : ''}`} onClick={() => handleUpdate(ex.id, 'isDone', !data.isDone)}>{data.isDone && '✓'}</button>
                <div className="exercise-info" style={{ flex: 1 }}>
                  <div className="exercise-title">{ex.name}</div>
                  <div className="exercise-meta">{ex.sets} подх. · {ex.rest}с отдых</div>
                  <div className="exercise-inputs">
                    <input type="number" className="weight-input" placeholder="кг" value={data.weight || ''} onChange={e => handleUpdate(ex.id, 'weight', e.target.value)} />
                    <button className={`timer-btn ${timerEx === ex.id ? 'active' : ''}`} onClick={() => setTimerEx(timerEx === ex.id ? null : ex.id)}>
                      {timerEx === ex.id ? <Timer seconds={ex.rest} onComplete={() => setTimerEx(null)} /> : `Отдых ${ex.rest}с`}
                    </button>
                    <button className="btn-ghost" onClick={() => { setEditIdx(idx); setForm(ex); setShowModal(true); }} style={{ padding: 8 }}>✏️</button>
                  </div>
                </div>
              </div>
            );
          })
        )}
        <button className="btn-secondary" onClick={() => { setEditIdx(null); setForm({ name: '', sets: '3', rest: 60 }); setShowModal(true); }} style={{ marginTop: 12 }}>+ Упражнение</button>
      </div>

      <Modal isOpen={showModal} title={editIdx !== null ? "Редактировать" : "Новое"} onClose={() => setShowModal(false)}>
        <div className="flex-col gap-12">
          <div><label className="label">Название</label><input value={form.name} onChange={e => setForm({ ...form, name: e.target.value })} placeholder="Жим штанги..." /></div>
          <div className="input-group">
            <div><label className="label">Подходы</label><input type="number" value={form.sets} onChange={e => setForm({ ...form, sets: e.target.value })} /></div>
            <div><label className="label">Отдых (с)</label><input type="number" value={form.rest} onChange={e => setForm({ ...form, rest: e.target.value })} /></div>
          </div>
          <button className="btn-primary" onClick={handleSaveExercise}>{editIdx !== null ? 'Сохр.' : 'Добавить'}</button>
        </div>
      </Modal>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════ */
/* 📊 DASHBOARD PAGE */
/* ═══════════════════════════════════════════════════════════════ */

function DashboardPage({ profile, partnerProfile }) {
  const [stats, setStats] = useState({ his: {}, her: {} });
  const [sharedGoal, setSharedGoal] = useState({ title: '100 км бега', current: 45, target: 100 });
  const [notes, setNotes] = useState('');
  const [partnerOnline, setPartnerOnline] = useState(false);

  /* ✅ FIX: Proper cleanup of Firebase listeners and offline status */
  useEffect(() => {
    const refs = [];
    const callbacks = [];

    // Profiles listener
    const profilesRef = db.ref('profiles');
    const profilesCallback = (snap) => {
      const data = snap.val();
      if (data) {
        setStats({ his: data.his?.stats || {}, her: data.her?.stats || {} });
        setSharedGoal(data.sharedGoal || sharedGoal);
        setNotes(data.sharedNotes || '');
      }
    };
    profilesRef.on('value', profilesCallback);
    refs.push(profilesRef);
    callbacks.push(profilesCallback);

    // Connected status for partner
    if (partnerProfile) {
      const connectedRef = db.ref('.info/connected');
      const connectedCallback = (snap) => setPartnerOnline(snap.val());
      connectedRef.on('value', connectedCallback);
      refs.push(connectedRef);
      callbacks.push(connectedCallback);
    }

    return () => {
      refs.forEach((ref, idx) => ref.off('value', callbacks[idx]));
    };
  }, [profile.id, sharedGoal, partnerProfile]);

  const updateNotes = (text) => {
    setNotes(text);
    db.ref('sharedNotes').set(text);
  };

  return (
    <div className="page active">
      <h1 className="title-lg">Сводка</h1>
      <p className="subtitle">Статистика пары</p>

      {/* Shared Goal */}
      <div className="shared-goal">
        <div className="shared-goal-title">{sharedGoal.title}</div>
        <div className="shared-goal-progress">{sharedGoal.current} / {sharedGoal.target} км</div>
        <div className="progress-bar" style={{ marginTop: 8 }}>
          <div className="progress-fill" style={{ width: `${(sharedGoal.current / sharedGoal.target) * 100}%` }} />
        </div>
      </div>

      {/* Shared Notes */}
      <div className="card">
        <label className="label">Любовные записки</label>
        <textarea rows="3" value={notes} onChange={e => updateNotes(e.target.value)} placeholder="Напиши что-то мотивирующее..." />
      </div>

      <div className="card">
        <div className="stats-grid">
          <div className="stat-card"><div className="stat-value" style={{ color: 'var(--his)' }}>{stats.his.totalWorkouts || 0}</div><div className="stat-label">Тренировок ОН</div></div>
          <div className="stat-card"><div className="stat-value" style={{ color: 'var(--her)' }}>{stats.her.totalWorkouts || 0}</div><div className="stat-label">Тренировок ОНА</div></div>
        </div>
        <label className="label">Достижения</label>
        <div className="achievements-grid">
          {ACHIEVEMENTS.map(ach => (
            <div key={ach.id} className={`achievement ${ach.earned ? 'unlocked' : ''}`} title={ach.desc}>
              <div className="achievement-icon">{ach.name}</div>
              <div className="achievement-name">{ach.label}</div>
            </div>
          ))}
        </div>
      </div>

      <div className="card text-center" style={{ background: 'linear-gradient(135deg, var(--his-bg), var(--her-bg))' }}>
        <div style={{ fontSize: 14, fontWeight: 600 }}>❤️ Вы крутая пара</div>
        <div className="subtitle" style={{ marginTop: 8, marginBottom: 0 }}>Продолжайте в том же духе! 💪</div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════ */
/* 👤 PROFILE PAGE */
/* ═══════════════════════════════════════════════════════════════ */

function ProfilePage({ profile, setProfile, dark, setDark, partnerProfile }) {
  const [showEdit, setShowEdit] = useState(false);
  const [editForm, setEditForm] = useState(profile);
  const [partnerOnline, setPartnerOnline] = useState(false);

  /* ✅ FIX: Proper cleanup on dark mode toggle and partner status */
  useEffect(() => {
    document.body.classList.toggle('dark', dark);
    localStorage.setItem('theme', dark ? 'dark' : 'light');
  }, [dark]);

  useEffect(() => {
    if (partnerProfile) {
      const connectedRef = db.ref('.info/connected');
      const callback = (snap) => setPartnerOnline(snap.val());
      connectedRef.on('value', callback);
      return () => connectedRef.off('value', callback);
    }
  }, [partnerProfile]);

  const handleSaveProfile = () => {
    setProfile(editForm);
    const userId = profile.userId || profile.id;
    const updates = {};
    updates[`profiles/${userId}`] = editForm;
    db.ref().update(updates);
    setShowEdit(false);
  };

  const handleGenderChange = (gender) => {
    const colors = { 'М': { primary: 'var(--his)', bg: 'var(--his-bg)' }, 'Ж': { primary: 'var(--her)', bg: 'var(--her-bg)' }, 'Другое': { primary: 'var(--purple)', bg: 'var(--purple-bg)' } };
    setEditForm({ ...editForm, gender, primaryColor: colors[gender].primary, bgColor: colors[gender].bg });
  };

  return (
    <div className="page active">
      <h1 className="title-lg">Профиль</h1>
      <p className="subtitle">Настройки и опции</p>

      <div className="card" style={{ display: 'flex', gap: 12, alignItems: 'center' }}>
        <div style={{ fontSize: 40, width: 60, textAlign: 'center' }}>{profile.avatar}</div>
        <div style={{ flex: 1 }}>
          <div style={{ fontWeight: 700, fontSize: 15 }}>{profile.name}</div>
          <div style={{ fontSize: 13, color: 'var(--text2)' }}>@{profile.nickname || 'нет'}</div>
          {partnerProfile && <div style={{ fontSize: 12, color: partnerOnline ? 'var(--green)' : 'var(--amber)' }}>Партнер: {partnerProfile.name} ({partnerOnline ? 'онлайн' : 'оффлайн'})</div>}
        </div>
        <button className="btn-ghost" onClick={() => { setEditForm(profile); setShowEdit(true); }}>✏️</button>
      </div>

      <div className="card">
        <label className="label">НАСТРОЙКИ</label>
        <div className="flex justify-between items-center mb-16">
          <div>
            <div className="exercise-title">Темная тема</div>
            <div className="exercise-meta">Переключить оформление</div>
          </div>
          <Toggle value={dark} onChange={setDark} />
        </div>
        <div className="flex justify-between items-center">
          <div>
            <div className="exercise-title">Уведомления</div>
            <div className="exercise-meta">Получать напоминания</div>
          </div>
          <Toggle value={profile.settings?.notifications} onChange={v => setProfile(p => ({ ...p, settings: { ...p.settings, notifications: v } }))} />
        </div>
      </div>

      <Modal isOpen={showEdit} title="Редактировать профиль" onClose={() => setShowEdit(false)}>
        <div className="flex-col gap-12">
          <div><label className="label">Имя</label><input value={editForm.name} onChange={e => setEditForm({ ...editForm, name: e.target.value })} /></div>
          <div><label className="label">Никнейм (@)</label><input value={editForm.nickname || ''} onChange={e => setEditForm({ ...editForm, nickname: e.target.value })} placeholder="@username" /></div>
          <div><label className="label">Дата рождения</label><input type="date" value={editForm.birthDate || ''} onChange={e => setEditForm({ ...editForm, birthDate: e.target.value })} /></div>
          <div><label className="label">Пол</label><select value={editForm.gender || 'М'} onChange={e => handleGenderChange(e.target.value)}><option>М</option><option>Ж</option><option>Другое</option></select></div>
          <div><label className="label">Аватар (эмодзи или ссылка)</label><input value={editForm.avatar} onChange={e => setEditForm({ ...editForm, avatar: e.target.value })} placeholder="🧑 или https://..." /></div>
          <div><label className="label">ID партнера</label><input value={editForm.partnerId || ''} onChange={e => setEditForm({ ...editForm, partnerId: e.target.value })} placeholder="partner_id" /></div>
          <button className="btn-primary" onClick={handleSaveProfile}>Сохранить</button>
        </div>
      </Modal>

      <div style={{ textAlign: 'center', fontSize: 11, color: 'var(--muted)', marginTop: 20, paddingBottom: 8 }}>Power Couple v3.0 · Сделано с ❤️</div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════ */
/* 🎯 MAIN APP */
/* ═══════════════════════════════════════════════════════════════ */

function App() {
  const [tab, setTab] = useState('workout');
  const [dark, setDark] = useState(() => localStorage.getItem('theme') === 'dark');
  const [currentUser, setCurrentUser] = useState('his');
  const [profile, setProfile] = useState(null);
  const [partnerProfile, setPartnerProfile] = useState(null);
  const [loading, setLoading] = useState(true);
  const [showTutorial, setShowTutorial] = useState(false);
  const [initialized, setInitialized] = useState(false);

  /* ✅ FIX: Telegram & Theme Initialization */
  useEffect(() => {
    tg?.ready?.();
    tg?.expand?.();
    const handleTheme = () => {
      const isDark = tg?.colorScheme === 'dark';
      setDark(isDark);
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
    };
    handleTheme();
    tg?.onEvent?.('themeChanged', handleTheme);
    return () => tg?.offEvent?.('themeChanged', handleTheme);
  }, []);

  /* ✅ FIX: Authentication and profile creation - ONE TIME INIT */
  useEffect(() => {
    if (initialized) return; // Prevent re-initialization
    
    const user = tg?.initDataUnsafe?.user;
    const userId = user?.id || 'default_user';
    
    const userRef = db.ref(`profiles/${userId}`);
    userRef.once('value').then((snap) => {
      let profileToUse;
      let isNewUser = false;
      
      if (!snap.exists()) {
        // Create new profile from Telegram data
        const defaultProfile = {
          id: userId,
          userId: userId,
          name: user?.first_name || 'Атлет',
          nickname: user?.username || '',
          avatar: user?.photo_url || '🧑',
          birthDate: '',
          gender: 'М',
          settings: { notifications: true },
          createdAt: new Date().toISOString(),
          tutorialCompleted: false
        };
        userRef.set(defaultProfile);
        profileToUse = defaultProfile;
        isNewUser = true;
      } else {
        profileToUse = snap.val();
        // Check if tutorial should be shown
        if (!profileToUse.tutorialCompleted) {
          isNewUser = true;
        }
      }
      
      setProfile(profileToUse);
      setCurrentUser(userId);
      if (isNewUser) {
        setShowTutorial(true);
      }
      setLoading(false);
      setInitialized(true);
    }).catch((error) => {
      console.warn('Firebase error:', error);
      // Fallback profile
      const fallbackProfile = {
        id: userId,
        userId: userId,
        name: user?.first_name || 'Атлет',
        nickname: user?.username || '',
        avatar: user?.photo_url || '🧑',
        birthDate: '',
        gender: 'М',
        settings: { notifications: true },
        createdAt: new Date().toISOString(),
        tutorialCompleted: false
      };
      setProfile(fallbackProfile);
      setCurrentUser(userId);
      setLoading(false);
      setInitialized(true);
    });
  }, [initialized]);

  /* Load profiles and partner - after initialization */
  useEffect(() => {
    if (!profile) return; // Wait for initialization
    
    const ref = db.ref('profiles');
    const callback = (snap) => {
      if (snap.exists()) {
        const data = snap.val();
        const currentProfile = data[profile.id] || profile;
        setProfile(currentProfile);
        if (currentProfile.partnerId && data[currentProfile.partnerId]) {
          setPartnerProfile(data[currentProfile.partnerId]);
        } else {
          setPartnerProfile(null);
        }
      }
    };
    ref.on('value', callback);
    return () => ref.off('value', callback);
  }, [profile?.id]);

  const tabs = [
    { id: 'workout', label: 'Зал', icon: 'workout' },
    { id: 'dashboard', label: 'Сводка', icon: 'dashboard' },
    { id: 'profile', label: 'Профиль', icon: 'profile' }
  ];

  return (
    <div className="layout">
      {loading ? (
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', height: '100vh', fontSize: 18, fontWeight: 600 }}>
          Загрузка...
        </div>
      ) : (
        <>
          <div className="content">
            <div className="pages-container">
              {tab === 'workout' && <WorkoutPage currentUser={currentUser} setCurrentUser={setCurrentUser} profile={profile} />}
              {tab === 'dashboard' && <DashboardPage profile={profile} partnerProfile={partnerProfile} />}
              {tab === 'profile' && <ProfilePage profile={profile} setProfile={setProfile} dark={dark} setDark={setDark} partnerProfile={partnerProfile} />}
            </div>
          </div>
          <nav className="navbar">
            {tabs.map(t => (
              <button key={t.id} className={`nav-btn ${tab === t.id ? 'active' : ''}`} onClick={() => { setTab(t.id); tg?.HapticFeedback?.selectionChanged?.(); }}>
                <div className="nav-icon"><Icon name={t.icon} /></div>
                <div className="nav-label">{t.label}</div>
                <div className="nav-dot" />
              </button>
            ))}
          </nav>
        </>
      )}
      <Modal isOpen={showTutorial} title="Добро пожаловать!" onClose={() => { setShowTutorial(false); if (profile) { const updates = {}; updates[`profiles/${profile.id}/tutorialCompleted`] = true; db.ref().update(updates); } }}>
        <div className="flex-col gap-12">
          <p>🎉 Привет! Это Power Couple — приложение для совместных тренировок.</p>
          <p>🏋️ В разделе "Зал" отмечайте выполненные подходы и используйте таймеры отдыха.</p>
          <p>📊 В "Сводке" следите за прогрессом пары и достижениями.</p>
          <p>👤 В "Профиле" настройте свой аккаунт и подключите партнера.</p>
          <button className="btn-primary" onClick={() => { setShowTutorial(false); if (profile) { const updates = {}; updates[`profiles/${profile.id}/tutorialCompleted`] = true; db.ref().update(updates); } }}>Понятно!</button>
        </div>
      </Modal>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
