<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Couple Workout Sync</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&family=Source+Sans+3:wght@400;600;700&display=swap');
        
        body { margin: 0; padding: 0; background: #F9F7F4; font-family: 'Source Sans 3', sans-serif; color: #1A1714; }
        .container { padding: 20px 16px 100px; max-width: 500px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 30px; }
        .card { background: white; border-radius: 24px; padding: 20px; margin-bottom: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.04); border: 1px solid #F0EDE8; }
        
        .tab-container { display: flex; gap: 10px; margin-bottom: 20px; position: sticky; top: 10px; z-index: 10; background: rgba(249, 247, 244, 0.8); backdrop-filter: blur(10px); padding: 5px; border-radius: 16px; }
        .tab-btn { flex: 1; padding: 14px; border: none; border-radius: 12px; font-weight: 700; font-size: 15px; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        
        .exercise-row { display: flex; align-items: center; gap: 15px; padding: 14px; border-radius: 16px; margin-bottom: 8px; cursor: pointer; border: 1px solid transparent; transition: all 0.2s; }
        .exercise-row.active { border-color: #F0EDE8; }
        .exercise-row.done { background: #F0FDF4; opacity: 0.8; }
        
        .check-circle { width: 28px; height: 28px; border-radius: 50%; border: 2px solid #D1C7BE; display: flex; align-items: center; justify-content: center; transition: 0.2s; flex-shrink: 0; background: white; }
        .check-circle.done { background: #22C55E; border-color: #22C55E; color: white; }
        
        .badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; margin-top: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
        .online-status { font-size: 11px; color: #22C55E; display: flex; align-items: center; justify-content: center; gap: 5px; margin-top: 8px; }
        .dot { width: 6px; height: 6px; background: #22C55E; border-radius: 50%; animation: pulse 2s infinite; }
        
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyB2DAs_1aIFBWKPoYrk9ewNTLPWBYy5e9A",
            authDomain: "coupleworkoutjb.firebaseapp.com",
            databaseURL: "https://coupleworkoutjb-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "coupleworkoutjb",
            storageBucket: "coupleworkoutjb.firebasestorage.app",
            messagingSenderId: "608590452427",
            appId: "1:608590452427:web:5e8d4e4a7a75d11bc9ed4e"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const workoutData = {
            main: {
                his: {
                    title: "Его программа",
                    goal: "Масса и сила",
                    color: "#3B82F6",
                    bg: "#EFF6FF",
                    accent: "#1D4ED8",
                    exercises: [
                        { name: "Жим штанги лёжа", sets: "3", reps: "8-10", rest: "90с" },
                        { name: "Тяга верхнего блока", sets: "3", reps: "10-12", rest: "90с" },
                        { name: "Жим гантелей сидя", sets: "3", reps: "10-12", rest: "60с" },
                        { name: "Тяга штанги в наклоне", sets: "3", reps: "10-12", rest: "90с" },
                        { name: "Приседания со штангой", sets: "3", reps: "10-12", rest: "90с" }
                    ]
                },
                her: {
                    title: "Её программа",
                    goal: "Тонус и рельеф",
                    color: "#EC4899",
                    bg: "#FDF2F8",
                    accent: "#BE185D",
                    exercises: [
                        { name: "Приседания с гантелями", sets: "3", reps: "15-20", rest: "45с" },
                        { name: "Румынская тяга", sets: "3", reps: "15", rest: "45с" },
                        { name: "Жим гантелей лёжа", sets: "3", reps: "15", rest: "45с" },
                        { name: "Выпады с гантелями", sets: "3", reps: "12 на ногу", rest: "45с" },
                        { name: "Ягодичный мостик", sets: "3", reps: "20", rest: "45с" }
                    ]
                }
            }
        };

        function App() {
            const [activeTab, setActiveTab] = useState("his");
            const [completed, setCompleted] = useState({});
            
            // Генерируем ID сессии на основе текущей даты (например, "2024-05-20")
            const dateId = new Date().toISOString().split('T')[0];

            useEffect(() => {
                const ref = db.ref(`workouts/${dateId}`);
                ref.on('value', (snapshot) => {
                    setCompleted(snapshot.val() || {});
                });
                
                if (window.Telegram?.WebApp) {
                    window.Telegram.WebApp.ready();
                    window.Telegram.WebApp.expand();
                }
                return () => ref.off();
            }, [dateId]);

            const toggle = (id) => {
                const newState = !completed[id];
                db.ref(`workouts/${dateId}/${id}`).set(newState);
                
                if (window.Telegram?.WebApp) {
                    window.Telegram.WebApp.HapticFeedback.impactOccurred('medium');
                }
            };

            const active = workoutData.main[activeTab];

            return (
                <div className="container">
                    <div className="header">
                        <div style={{fontSize: '40px'}}>💑</div>
                        <h1 style={{fontFamily: "'Playfair Display', serif", margin: '10px 0 0', fontSize: '28px'}}>Наш Воркаут</h1>
                        <div className="online-status">
                            <span className="dot"></span> Синхронизация активна
                        </div>
                    </div>

                    <div className="tab-container">
                        <button className="tab-btn" onClick={() => setActiveTab("his")} 
                            style={{ background: activeTab === "his" ? "#3B82F6" : "white", color: activeTab === "his" ? "white" : "#5C544C", boxShadow: activeTab === "his" ? "0 4px 12px rgba(59,130,246,0.3)" : "none" }}>
                            🏋️ ОН
                        </button>
                        <button className="tab-btn" onClick={() => setActiveTab("her")} 
                            style={{ background: activeTab === "her" ? "#EC4899" : "white", color: activeTab === "her" ? "white" : "#5C544C", boxShadow: activeTab === "her" ? "0 4px 12px rgba(236,72,153,0.3)" : "none" }}>
                            🌸 ОНА
                        </button>
                    </div>

                    <div className="card">
                        <div style={{marginBottom: '20px'}}>
                            <div style={{fontSize: '20px', fontWeight: 700}}>{active.title}</div>
                            <div className="badge" style={{background: active.bg, color: active.accent}}>{active.goal}</div>
                        </div>

                        {active.exercises.map((ex, i) => {
                            const id = `${activeTab}_${i}`;
                            const isDone = !!completed[id];
                            return (
                                <div key={id} className={`exercise-row ${isDone ? 'done' : 'active'}`} onClick={() => toggle(id)}>
                                    <div className={`check-circle ${isDone ? 'done' : ''}`}>
                                        {isDone && "✓"}
                                    </div>
                                    <div style={{flex: 1}}>
                                        <div style={{fontWeight: 700, fontSize: '16px', textDecoration: isDone ? 'line-through' : 'none'}}>{ex.name}</div>
                                        <div style={{fontSize: '13px', color: '#7C746C'}}>{ex.sets} × {ex.reps} • отдых {ex.rest}</div>
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                    
                    <div style={{textAlign: 'center', color: '#A0998F', fontSize: '12px', marginTop: '20px'}}>
                        Данные обновляются в реальном времени для обоих устройств
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
